! ==============================================
! FORTIGATE FIREWALL POLICIES
! ==============================================

! ==============================================
! ADDRESS OBJECTS
! ==============================================

config firewall address
    ! HQ Networks
    edit "HQ-DATA-VLAN10"
        set subnet 10.0.4.0 255.255.255.0
    next
    edit "HQ-VOICE-VLAN20"
        set subnet 10.0.5.0 255.255.255.0
    next
    edit "HQ-GUEST-VLAN30"
        set subnet 10.0.6.0 255.255.255.0
    next
    edit "HQ-IOT-VLAN40"
        set subnet 10.0.7.0 255.255.255.0
    next
    edit "HQ-MGMT-VLAN50"
        set subnet 10.0.0.0 255.255.254.0
    next
    edit "HQ-SERVERS-VLAN60"
        set subnet 10.0.2.0 255.255.254.0
    next
    
    ! Branch Networks
    edit "BRANCH-DATA-VLAN10"
        set subnet 192.168.1.0 255.255.255.0
    next
    edit "BRANCH-VOICE-VLAN20"
        set subnet 192.168.3.0 255.255.255.0
    next
    edit "BRANCH-GUEST-VLAN30"
        set subnet 192.168.4.0 255.255.255.0
    next
    edit "BRANCH-IOT-VLAN40"
        set subnet 192.168.5.0 255.255.255.0
    next
    edit "BRANCH-MGMT-VLAN50"
        set subnet 192.168.6.0 255.255.255.0
    next
    edit "BRANCH-SERVERS-VLAN60"
        set subnet 192.168.2.0 255.255.255.0
    next
    
    ! VPN Subnets
    edit "SSL-VPN-POOL"
        set subnet 192.168.245.0 255.255.254.0
    next
    
    ! WAN/Internet
    edit "INTERNET"
        set subnet 0.0.0.0 0.0.0.0
    next
    
    ! Specific Servers
    edit "AD-DHCP-DNS-SERVER"
        set subnet 10.0.2.10 255.255.255.255
    next
    edit "NAC-SERVER"
        set subnet 10.0.2.11 255.255.255.255
    next
    edit "TFTP-SERVER"
        set subnet 10.0.2.12 255.255.255.255
    next
    edit "SYSLOG-SERVER"
        set subnet 10.0.2.13 255.255.255.255
    next
end

! ==============================================
! SERVICE OBJECTS
! ==============================================

config firewall service custom
    edit "AD-SERVICES"
        set tcp-portrange 53 88 135 139 389 445 464 636 3268-3269
        set udp-portrange 53 88 123 135 138 139 389 445 464 636
    next
    edit "DHCP-SERVICES"
        set udp-portrange 67 68
    next
    edit "TFTP-SERVICES"
        set udp-portrange 69
    next
    edit "NTP-SERVICES"
        set udp-portrange 123
    next
    edit "SYSLOG-SERVICES"
        set udp-portrange 514
        set tcp-portrange 514
    next
    edit "RADIUS-SERVICES"
        set udp-portrange 1812 1813
        set tcp-portrange 1812 1813
    next
    edit "TACACS-SERVICES"
        set tcp-portrange 49
    next
    edit "ICMP-ALL"
        set protocol 1
    next
end

! ==============================================
! FIREWALL POLICIES
! ==============================================

! ==============================================
! POLICY 1: HQ to Internet (NAT - Allowed)
! ==============================================

config firewall policy
    edit 1
        set name "HQ-to-Internet"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "HQ-DATA-VLAN10" "HQ-VOICE-VLAN20" "HQ-MGMT-VLAN50" "HQ-SERVERS-VLAN60"
        set dstaddr "INTERNET"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
        set logtraffic all
        set comments "HQ Internal networks to Internet with NAT"
    next
end

! ==============================================
! POLICY 2: Guest VLAN to Internet (Restricted)
! ==============================================

config firewall policy
    edit 2
        set name "Guest-to-Internet-Restricted"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "HQ-GUEST-VLAN30"
        set dstaddr "INTERNET"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS" "DNS"
        set nat enable
        set logtraffic all
        set comments "Guest VLAN - Only HTTP/HTTPS/DNS allowed"
        set application list "block-p2p" "block-gaming" "block-streaming"
    next
end

! ==============================================
! POLICY 3: IoT VLAN to Internet (Blocked - Local only)
! ==============================================

config firewall policy
    edit 3
        set name "IoT-to-Internet-Blocked"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "HQ-IOT-VLAN40"
        set dstaddr "INTERNET"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "IoT devices - Internet access blocked"
    next
end

! ==============================================
! POLICY 4: HQ to Branch (Site-to-Site VPN)
! ==============================================

config firewall policy
    edit 4
        set name "HQ-to-Branch-VPN"
        set srcintf "port2"
        set dstintf "HQ-to-Branch-FortiGate"
        set srcaddr "HQ-DATA-VLAN10" "HQ-VOICE-VLAN20" "HQ-MGMT-VLAN50" "HQ-SERVERS-VLAN60"
        set dstaddr "BRANCH-DATA-VLAN10" "BRANCH-VOICE-VLAN20" "BRANCH-MGMT-VLAN50" "BRANCH-SERVERS-VLAN60"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "HQ to Branch via Site-to-Site VPN"
    next
end

! ==============================================
! POLICY 5: Branch to HQ (Site-to-Site VPN - Return)
! ==============================================

config firewall policy
    edit 5
        set name "Branch-to-HQ-VPN"
        set srcintf "HQ-to-Branch-FortiGate"
        set dstintf "port2"
        set srcaddr "BRANCH-DATA-VLAN10" "BRANCH-VOICE-VLAN20" "BRANCH-MGMT-VLAN50" "BRANCH-SERVERS-VLAN60"
        set dstaddr "HQ-DATA-VLAN10" "HQ-VOICE-VLAN20" "HQ-MGMT-VLAN50" "HQ-SERVERS-VLAN60"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "Branch to HQ via Site-to-Site VPN"
    next
end

! ==============================================
! POLICY 6: SSL VPN Users to Internal Networks
! ==============================================

config firewall policy
    edit 6
        set name "SSL-VPN-to-Internal"
        set srcintf "ssl.root"
        set dstintf "port2"
        set srcaddr "SSL-VPN-POOL"
        set dstaddr "HQ-DATA-VLAN10" "HQ-VOICE-VLAN20" "HQ-MGMT-VLAN50" "HQ-SERVERS-VLAN60" "BRANCH-DATA-VLAN10" "BRANCH-MGMT-VLAN50" "BRANCH-SERVERS-VLAN60"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
        set logtraffic all
        set comments "SSL VPN users access to Internal networks"
    next
end

! ==============================================
! POLICY 7: SSL VPN to Internet (Split Tunnel)
! ==============================================

config firewall policy
    edit 7
        set name "SSL-VPN-to-Internet"
        set srcintf "ssl.root"
        set dstintf "port1"
        set srcaddr "SSL-VPN-POOL"
        set dstaddr "INTERNET"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
        set logtraffic all
        set comments "SSL VPN users to Internet (Split Tunnel)"
    next
end

! ==============================================
! POLICY 8: HQ to NAC Server (RADIUS)
! ==============================================

config firewall policy
    edit 8
        set name "HQ-to-NAC-Server"
        set srcintf "port2"
        set dstintf "port2"
        set srcaddr "HQ-DATA-VLAN10" "HQ-MGMT-VLAN50"
        set dstaddr "NAC-SERVER"
        set action accept
        set schedule "always"
        set service "RADIUS-SERVICES"
        set logtraffic all
        set comments "NAC/RADIUS authentication traffic"
    next
end

! ==============================================
! POLICY 9: HQ to AD/DHCP/DNS Servers
! ==============================================

config firewall policy
    edit 9
        set name "HQ-to-AD-DHCP-DNS"
        set srcintf "port2"
        set dstintf "port2"
        set srcaddr "ALL"
        set dstaddr "AD-DHCP-DNS-SERVER"
        set action accept
        set schedule "always"
        set service "AD-SERVICES" "DHCP-SERVICES" "DNS"
        set logtraffic all
        set comments "AD/DHCP/DNS services"
    next
end

! ==============================================
! POLICY 10: HQ to TFTP Server
! ==============================================

config firewall policy
    edit 10
        set name "HQ-to-TFTP-Server"
        set srcintf "port2"
        set dstintf "port2"
        set srcaddr "HQ-MGMT-VLAN50"
        set dstaddr "TFTP-SERVER"
        set action accept
        set schedule "always"
        set service "TFTP-SERVICES"
        set logtraffic all
        set comments "TFTP backup/restore from management VLAN"
    next
end

! ==============================================
! POLICY 11: HQ to Syslog Server
! ==============================================

config firewall policy
    edit 11
        set name "HQ-to-Syslog"
        set srcintf "port2"
        set dstintf "port2"
        set srcaddr "HQ-MGMT-VLAN50"
        set dstaddr "SYSLOG-SERVER"
        set action accept
        set schedule "always"
        set service "SYSLOG-SERVICES"
        set logtraffic all
        set comments "Syslog logging from network devices"
    next
end

! ==============================================
! POLICY 12: Default Deny (Implicit)
! ==============================================

config firewall policy
    edit 0
        set name "Default-Deny"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "ALL"
        set dstaddr "ALL"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "Default deny - catch all"
    next
end

! ==============================================
! APPLICATION CONTROL / WEB FILTERING
! ==============================================

config application list
    edit "block-p2p"
        set category 1
        set application 1 2 3 4 5
    next
    edit "block-gaming"
        set category 2
        set application 6 7 8 9 10
    next
    edit "block-streaming"
        set category 3
        set application 11 12 13 14 15
    next
end

! ==============================================
! WEB FILTERING PROFILE (For Guest VLAN)
! ==============================================

config webfilter profile
    edit "guest-filter"
        set comment "Guest VLAN Web Filtering"
        set log-all-url enable
        config web-filter
            set url-filter-table 1
        end
        config ftgd-wf
            set filter-mode blacklist
            config categories
                edit 1
                    set action block
                next
                edit 2
                    set action block
                next
                edit 3
                    set action block
                next
                edit 4
                    set action monitor
                next
            end
        end
    next
end
