! SSL VPN Configuration
config vpn ssl settings
    set servercert "Fortinet_CA_SSL"
    set tunnel-ip-pools "SSL-VPN-POOL"
    set tunnel-ipv6-pools "SSL-VPN-POOL6"
    set port 443
    set source-interface "port1"
    set source-address "all"
    set source-address6 "all"
    set default-portal "full-access"
    set login-attempt-limit 5
    set auth-timeout 30
    set idle-timeout 30
    set auth-timeout-type idle
    set advertise-ip enable
    set advertise-ip6 enable
    set ipv6-status enable
    set auto-tunnel-static-route enable
end

! SSL VPN IP Pool - 192.168.245.0/23
config vpn ssl web portal
    edit "full-access"
        set tunnel-mode enable
        set web-mode disable
        set split-tunneling enable
        set ip-pools "SSL-VPN-POOL"
        set split-tunneling-routing-address "all"
    next
end

config firewall address
    edit "SSL-VPN-POOL"
        set subnet 192.168.245.0 255.255.254.0
    next
end

! SSL VPN User Authentication
config user local
    edit "vpn-user"
        set type password
        set passwd "Fortinet@123"
    next
end

config user group
    edit "SSL-VPN-GROUP"
        set member "vpn-user"
    next
end

! SSL VPN Policy
config firewall policy
    edit 0
        set name "SSL-VPN-ACCESS"
        set srcintf "ssl.root"
        set dstintf "port2"
        set srcaddr "SSL-VPN-POOL"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
end
